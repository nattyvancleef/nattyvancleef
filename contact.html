<!DOCTYPE html>
<html>
<head>
  <title>Contact - nattyvancleef</title>
  <meta charset="UTF-8" />
  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: #f7f6f4;
      color: #1a1a1a;
    }

    /* Return arrow styled as a keyhole with blur effect */
    .return-arrow {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 24px;
      color: #fff;
      text-decoration: none;
      padding: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(4px);
      transition: filter 0.3s, background 0.3s;
      z-index: 10;
    }

    .return-arrow:hover {
      filter: blur(1px);
      background: rgba(255, 255, 255, 0.3);
    }

    section {
      padding: 50px 20px;
      max-width: 600px;
      margin: auto;
      text-align: center;
    }

    h2 {
      font-size: 2em;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.2em;
      margin: 10px 0;
    }
  </style>
</head>
<body>

<!-- Return arrow as keyhole -->
<a href="index.html" class="return-arrow" aria-label="Return to homepage">
  &#8592;
</a>

<section id="contact">
  <h2>Contact</h2>
  <p>Email: charliesangster@icloud.com</p>
  <p>Instagram: <a href="https://instagram.com/charliesngster" target="_blank">@charliesngster</a></p>
</section>

</body>
</html>
