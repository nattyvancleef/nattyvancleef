<!DOCTYPE html>
<html>
<head>
  <title>Contact - nattyvancleef</title>
  <meta charset="UTF-8" />
  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      font-weight: 300; /* Slightly thinner font for elegance */
      background: #f7f6f4;
      color: #1a1a1a;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Return arrow styled as a keyhole with blur effect, now displaying "NVC" */
    .return-arrow {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 24px;
      color: #fff;
      text-decoration: none;
      padding: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(4px);
      transition: filter 0.3s, background 0.3s;
      z-index: 10;
    }

    /* Show "NVC" text on arrow button, thinner and stretched */
    .return-arrow::after {
      content: "NVC";
      font-weight: 300;
      display: inline-block;
      width: 80px;
      text-align: center;
    }

    .return-arrow:hover {
      filter: blur(1px);
      background: rgba(255, 255, 255, 0.3);
    }

    /* Style for the contact info at the bottom */
    #contact-info {
      padding: 50px 20px;
      max-width: 600px;
      margin: auto;
      text-align: center;
      margin-top: auto; /* Pushes it down in flex layout */
    }

    h2 {
      font-size: 2em;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.2em;
      margin: 10px 0;
    }

    /* Hyperlink styles: red with underline */
    a {
      color: red;
      text-decoration: underline;
    }

    /* Optional: style for the hero video overlay container (kept hidden) */
    #hero-video {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 999;
    }

    #hero-video video {
      width: 100%; height: 100%; object-fit: cover;
    }
  </style>
</head>
<body>

<!-- Hero Video Overlay (hidden by default) -->
<div id="hero-video">
  <video src="your-hero-video.mp4" autoplay muted loop playsinline></video>
</div>

<!-- Return arrow with "NVC" text -->
<a href="index.html" class="return-arrow" aria-label="Return to homepage"></a>

<!-- Spacer to push contact info to the bottom -->
<div style="flex: 1;"></div>

<!-- Contact info at the bottom of the page -->
<section id="contact-info">
  <h2>Contact</h2>
  <p>Email: charliesangster@icloud.com</p>
  <p>Instagram: <a href="https://instagram.com/charliesngster" target="_blank">@charliesngster</a></p>
  <p>YouTube: <a href="https://youtube.com/c/nattyvancleef" target="_blank">nattyvancleef</a></p>
</section>

</body>
</html>
