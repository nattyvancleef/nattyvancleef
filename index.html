<html>
<head>
  <title>My Site</title>
  <meta charset="UTF-8">

  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: #f7f6f4;
      color: #1a1a1a;
    }

    /* HEADER STYLES */
    header {
      display: flex;
      justify-content: space-between;
      padding: 25px 50px;
      font-size: 14px;
      letter-spacing: 1px;
      position: relative;
      z-index: 10;
      background: rgba(247, 246, 244, 0.8); /* optional background for header */
    }

    header a {
      text-decoration: none;
      color: inherit;
      margin: 0 8px;
      transition: filter 0.3s ease, opacity 0.3s ease;
    }

    header:hover a {
      filter: blur(2px);
    }

    header a:hover {
      filter: blur(0);
      opacity: 1;
    }

    /* HERO VIDEO AS BACKGROUND FULL PAGE */
    .hero-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      z-index: -1; /* behind everything else */
    }

    .hero-background video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Overlay content over the background video */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 20px;
      z-index: 1;
    }

    .hero h1 {
      font-size: 3.5em;
      max-width: 800px;
      font-weight: 400;
      line-height: 1.25;
      color: #fff;
    }

    /* OTHER STYLES (sections, grid, etc.) as before */
    section {
      padding: 100px 20px;
      max-width: 1000px;
      margin: auto;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    h2 {
      font-size: 2em;
      margin-bottom: 20px;
    }

    p {
      color: #666;
      line-height: 1.6;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 40px;
    }

    .card {
      height: 200px;
      background: #ddd;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      letter-spacing: 1px;
    }

    /* MUSIC SECTION */
    .music-list {
      margin-top: 40px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .track {
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      text-align: left;
    }

    .track-title {
      font-size: 14px;
      letter-spacing: 1px;
    }

    audio {
      width: 100%;
    }

    /* FOOTER */
    footer {
      padding: 60px 20px;
      text-align: center;
      font-size: 14px;
      color: #777;
    }
  </style>
</head>
