<!DOCTYPE html>
<html>
<head>
  <title>nattyvancleef</title>
  <meta charset="UTF-8" />
  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: #f7f6f4;
      color: #1a1a1a;
    }

    /* Navigation menu styles */
    nav {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      align-items: center;
      z-index: 10;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 30px;
      margin: 0;
      padding: 0;
    }

    nav ul li {
      display: inline;
    }

    /* Menu links styling */
    nav ul li a {
      text-decoration: none;
      color: #fff;
      font-size: 24px; /* bigger and sleeker */
      font-weight: 600;
      padding: 8px 12px;
      border-radius: 4px;
      transition: filter 0.3s, mix-blend-mode 0.3s;
      font-family: "Helvetica Neue", Arial, sans-serif;
      backdrop-filter: none; /* no overlay background */
    }

    /* Hover effect: blur and blending with hero video */
    nav ul li a:hover {
      filter: blur(1px);
      mix-blend-mode: overlay;
    }

    /* HERO VIDEO AS BACKGROUND FULL PAGE */
    .hero-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      z-index: -1; /* behind everything else */
    }

    .hero-background video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Overlay content over the background video */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 20px;
      z-index: 1;
    }

    /* Larger, sleeker font for main title */
    .hero h1 {
      font-size: 4em; /* bigger */
      max-width: 800px;
      font-weight: 700;
      line-height: 1.2;
      color: #fff;
      margin: 0;
    }

    /* Small text styling remains same but can be adjusted if needed */
    .hero p {
      color: #fff;
      font-size: 1.2em;
      margin-top: 20px;
      background: rgba(0, 0, 0, 0.3);
      padding: 10px 20px;
      border-radius: 10px;
    }

    /* Sections styles */
    section {
      padding: 100px 20px;
      max-width: 1000px;
      margin: auto;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    h2 {
      font-size: 2em;
      margin-bottom: 20px;
    }

    p {
      color: #666;
      line-height: 1.6;
    }
  </style>
</head>
<body>

<!-- Navigation Menu at Top Right -->
<nav>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="photos.html">Photos</a></li>
    <li><a href="videos.html">Videos</a></li>
    <li><a href="music.html">Music</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<!-- Full-page background video -->
<div class="hero-background">
  <video autoplay muted loop playsinline>
    <source src="ambshighschoolinvert.2.mp4" type="video/mp4" />
    Your browser does not support the video tag.
  </video>
</div>

<!-- Hero overlay content -->
<section class="hero" id="top">
  <h1>nattyvancleef</h1>
  <p>Welcome to my portfolio site. Use the menu to navigate to different pages.</p>
</section>

</body>
</html>
