<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Music - nattyvancleef</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@300&display=swap');

body {
  margin: 0;
  font-family: 'Helvetica Neue', Arial, sans-serif;
  background: #000;
  color: #fff;
  overflow: hidden;
}

/* NAV */
nav {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 10;
}
nav ul {
  display: flex;
  gap: 30px;
  list-style: none;
  margin: 0;
  padding: 0;
}
nav a {
  color: #fff;
  text-decoration: none;
  font-size: 24px;
  font-weight: 300;
  transition: filter 0.3s;
}
nav a:hover { filter: blur(1px); }

/* NVC */
.return-arrow {
  position: fixed;
  top: 20px;
  left: 20px;
  color: #fff;
  text-decoration: none;
  font-size: 14px;
  letter-spacing: 2px;
  z-index: 10;
  opacity: 0.6;
}

/* JUKEBOX CONTAINER */
.jukebox {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 14px;
}

/* TRACK */
.track-ui {
  width: min(520px, 85vw);
  padding: 16px 18px;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 10px;
  background: rgba(20,20,20,0.6);
  backdrop-filter: blur(8px);
  font-size: 18px;
  text-align: left;
  cursor: pointer;
  transition: 0.2s ease;
  position: relative;
}

.track-ui:hover {
  transform: scale(1.02);
  border-color: rgba(255,255,255,0.35);
}

.track-ui::before {
  content: "▶";
  margin-right: 10px;
  opacity: 0.7;
}

.track-ui.playing {
  border-color: rgba(255,255,255,0.7);
  background: rgba(40,40,40,0.85);
}

/* arrows */
.arrow {
  position: fixed;
  bottom: 80px;
  font-size: 22px;
  cursor: pointer;
  user-select: none;
}
#leftArrow { left: 48%; }
#rightArrow { right: 48%; }

/* overlay */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  opacity: 0;
  pointer-events: none;
}
.overlay.active {
  opacity: 1;
  pointer-events: all;
}

/* MOBILE TWEAK ONLY (same layout, just scaling) */
@media (max-width: 600px){

  nav a {
    font-size: 20px;
  }

  .return-arrow {
    font-size: 16px;
  }

  .track-ui {
    font-size: 16px;
    padding: 14px 16px;
  }

  .arrow {
    bottom: 60px;
  }
}
</style>
</head>

<body>

<a href="index.html" class="return-arrow">NVC</a>

<nav>
<ul>
<li><a href="photos.html">Photos</a></li>
<li><a href="videos.html">Videos</a></li>
<li><a href="music.html">Music</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>
</nav>

<div id="leftArrow" class="arrow">←</div>
<div id="rightArrow" class="arrow">→</div>
<div id="overlay" class="overlay"></div>

<div class="jukebox" id="jukebox"></div>

<script>
const pages = [
[
{ name:"Paul and Djon", src:"paul and djon.mp3" },
{ name:"Almostblue", src:"Almostbloue.mp3" },
{ name:"Architecture", src:"Architecture2.mp3" },
{ name:"bailey", src:"bailey3.mp3" },
{ name:"BODYOFME", src:"BODYOFME RM.mp3" },
{ name:"deathproof", src:"deathproof2.mp3" }
],
[
{ name:"...", src:"" },
{ name:"...", src:"" },
{ name:"...", src:"" },
{ name:"...", src:"" },
{ name:"...", src:"" },
{ name:"...", src:"" }
],
[
{ name:"...", src:"" },
{ name:"...", src:"" },
{ name:"...", src:"" },
{ name:"...", src:"" },
{ name:"...", src:"" },
{ name:"...", src:"" }
]
];

let currentPage = 0;
let currentAudio = null;

const jukebox = document.getElementById("jukebox");

function buildUI(){
  jukebox.innerHTML = "";

  pages[currentPage].forEach((track, i)=>{
    const div = document.createElement("div");
    div.className = "track-ui";
    div.textContent = track.name;

    div.onclick = () => playTrack(i, div);

    jukebox.appendChild(div);
  });
}

function playTrack(i, el){

  const track = pages[currentPage][i];

  document.querySelectorAll(".track-ui").forEach(t=>{
    t.classList.remove("playing");
  });

  if(currentAudio){
    currentAudio.pause();
  }

  if(track.src){
    const audio = new Audio(track.src);
    audio.play();
    currentAudio = audio;

    el.classList.add("playing");

    overlay.classList.add("active");

    audio.onended = () => {
      overlay.classList.remove("active");
      el.classList.remove("playing");
    };
  }
}

/* NAV */
leftArrow.onclick = () => {
  currentPage = (currentPage - 1 + pages.length) % pages.length;
  if(currentAudio) currentAudio.pause();
  overlay.classList.remove("active");
  buildUI();
};

rightArrow.onclick = () => {
  currentPage = (currentPage + 1) % pages.length;
  if(currentAudio) currentAudio.pause();
  overlay.classList.remove("active");
  buildUI();
};

overlay.onclick = () => {
  if(currentAudio) currentAudio.pause();
  overlay.classList.remove("active");
};

buildUI();
</script>

</body>
</html>
