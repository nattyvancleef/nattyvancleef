<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Music - nattyvancleef</title>
<style>
  body {
    margin: 0;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: #000;
    overflow: hidden;
  }
  #circleCanvas {
    position: fixed;
    inset: 0;
    z-index: 2;
    cursor: grab;
  }
  #seekSlider {
    position: fixed;
    bottom: 10px;
    width: 80%;
    left: 10%;
    z-index: 3;
  }
  .visualiser {
    width: 100%;
    height: 60px;
    display: block;
    position: fixed;
    bottom: 50px;
    left: 0;
    z-index: 3;
  }
  /* Optional: add navigation or other styles as needed */
</style>
</head>
<body>

<canvas id="circleCanvas"></canvas>
<input type="range" id="seekSlider" min="0" max="100" value="0" step="0.1"/>

<canvas class="visualiser"></canvas>

<script>
// Set up canvases
const circleCanvas = document.getElementById('circleCanvas');
const ctx = circleCanvas.getContext('2d');
const visualizerCanvas = document.querySelector('.visualiser');
const vCtx = visualizerCanvas.getContext('2d');

let cw = window.innerWidth;
let ch = window.innerHeight;
circleCanvas.width = cw;
circleCanvas.height = ch;
visualizerCanvas.width = cw;
visualizerCanvas.height = 60;

window.addEventListener('resize', () => {
  cw = window.innerWidth;
  ch = window.innerHeight;
  circleCanvas.width = cw;
  circleCanvas.height = ch;
  visualizerCanvas.width = cw;
});

// Define tracks
const tracks = [
  { name: 'Track 1', audioId: 'audio1', angle: 0 },
  { name: 'Track 2', audioId: 'audio2', angle: Math.PI/3 },
  { name: 'Track 3', audioId: 'audio3', angle: 2*Math.PI/3 },
  { name: 'Track 4', audioId: 'audio4', angle: Math.PI },
  { name: 'Track 5', audioId: 'audio5', angle: 4*Math.PI/3 },
  { name: 'Track 6', audioId: 'audio6', angle: 5*Math.PI/3 }
];

// Create dummy audio elements
tracks.forEach(t => {
  const a = document.createElement('audio');
  a.id = t.audioId;
  a.src = 'https://www.w3schools.com/html/horse.mp3'; // Placeholder mp3
  document.body.appendChild(a);
});

let wheelRotation = 0;
let isDragging = false;
let lastX = 0;
let currentAudio = null;
let currentTrack = null;

// Draw wheel
function drawWheel() {
  ctx.clearRect(0, 0, cw, ch);
  ctx.save();
  ctx.translate(cw/2, ch/2);
  ctx.rotate(wheelRotation);
  const radius = 150;
  tracks.forEach(track => {
    const x = Math.cos(track.angle) * radius;
    const y = Math.sin(track.angle) * radius;
    ctx.beginPath();
    ctx.arc(x, y, 20, 0, Math.PI*2);
    ctx.fillStyle = 'white';
    ctx.fill();
    ctx.fillStyle = 'yellow';
    ctx.font = '12px Helvetica Neue';
    ctx.fillText(track.name, x - 20, y + 35);
  });
  ctx.restore();
  requestAnimationFrame(drawWheel);
}
drawWheel();

// Animate visualizer
let angle = 0;
function animateVisualizer() {
  requestAnimationFrame(animateVisualizer);
  vCtx.clearRect(0, 0, cw, 60);
  for (let i=0; i<5; i++) {
    const x = cw/2 + Math.sin(angle + i) * (cw/3);
    const y = 30 + Math.cos(angle + i) * 10;
    vCtx.beginPath();
    vCtx.arc(x, y, 10+Math.sin(angle + i*2)*5, 0, Math.PI*2);
    vCtx.fillStyle = `rgba(255,255,255,${0.2 + Math.sin(angle + i)*0.3})`;
    vCtx.fill();
  }
  angle += 0.02;
}
animateVisualizer();

// Drag to rotate wheel
circleCanvas.addEventListener('mousedown', (e) => {
  isDragging = true;
  lastX = e.clientX;
});
window.addEventListener('mouseup', () => { isDragging = false; });
window.addEventListener('mousemove', (e) => {
  if (isDragging) {
    const deltaX = e.clientX - lastX;
    wheelRotation += deltaX * 0.01;
    lastX = e.clientX;
  }
});

// Touch support
circleCanvas.addEventListener('touchstart', (e) => {
  isDragging = true;
  lastX = e.touches[0].clientX;
});
window.addEventListener('touchend', () => { isDragging = false; });
window.addEventListener('touchmove', (e) => {
  if (isDragging) {
    const deltaX = e.touches[0].clientX - lastX;
    wheelRotation += deltaX * 0.01;
    lastX = e.touches[0].clientX;
  }
});

// Detect click on wheel
circleCanvas.addEventListener('click', (e) => {
  const rect = circleCanvas.getBoundingClientRect();
  const x = e.clientX - rect.left - cw/2;
  const y = e.clientY - rect.top - ch/2;
  const clickAngle = Math.atan2(y, x) - wheelRotation;

  let minDiff = Math.PI;
  let closestTrack = null;
  tracks.forEach(track => {
    let diff = Math.abs(track.angle - clickAngle);
    if (diff > Math.PI) diff = Math.abs(diff - 2*Math.PI);
    if (diff < minDiff) {
      minDiff = diff;
      closestTrack = track;
    }
  });
  if (closestTrack) {
    selectTrack(closestTrack);
  }
});

// Play selected track
function selectTrack(track) {
  if (currentAudio) {
    currentAudio.pause();
  }
  currentAudio = document.getElementById(track.audioId);
  currentAudio.currentTime = 0;
  currentAudio.play();
  // Update active class or highlight if needed
  currentTrack = track;
}

// Update seek slider
const seekSlider = document.getElementById('seekSlider');

function updateSlider() {
  if (currentAudio && currentAudio.duration) {
    seekSlider.max = currentAudio.duration;
    seekSlider.value = currentAudio.currentTime;
  }
  requestAnimationFrame(updateSlider);
}
updateSlider();

seekSlider.addEventListener('input', () => {
  if (currentAudio) {
    currentAudio.currentTime = seekSlider.value;
  }
});
if (currentAudio) {
  currentAudio.addEventListener('timeupdate', () => {
    seekSlider.value = currentAudio.currentTime;
  });
}
</script>

</body>
</html>
