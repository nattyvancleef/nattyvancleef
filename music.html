<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Music - nattyvancleef</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@300&display=swap');

body {
  margin: 0;
  font-family: 'Helvetica Neue', Arial, sans-serif;
  background: #000;
  color: #fff;
  overflow: hidden;
}

/* NAV */
nav {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 10;
}
nav ul {
  display: flex;
  gap: 30px;
  list-style: none;
}
nav a {
  color: #fff;
  text-decoration: none;
  font-size: 24px;
  font-weight: 300;
}
nav a:hover {
  filter: blur(1px);
}

.return-arrow {
  position: fixed;
  top: 20px;
  left: 20px;
  color: #fff;
  text-decoration: none;
  font-size: 14px;
  letter-spacing: 2px;
  z-index: 10;
}

/* CANVAS */
canvas {
  position: fixed;
  inset: 0;
}

/* TRACK UI */
.track-ui {
  position: absolute;
  text-align: center;
  transform: translate(-50%, -50%);
  width: 130px;
  font-size: 12px;
}

.progress {
  height: 4px;
  background: rgba(255,255,255,0.2);
  margin-top: 5px;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: white;
}

.time {
  font-size: 10px;
  opacity: 0.6;
  text-align: right;
}
</style>
</head>

<body>

<a href="index.html" class="return-arrow">NVC</a>

<nav>
<ul>
<li><a href="photos.html">Photos</a></li>
<li><a href="videos.html">Videos</a></li>
<li><a href="music.html">Music</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>
</nav>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let w = canvas.width = window.innerWidth;
let h = canvas.height = window.innerHeight;

window.addEventListener("resize", () => {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
});

/* ⭐ STARFIELD */
let stars = Array.from({length: 150}, () => ({
  x: Math.random()*w,
  y: Math.random()*h,
  r: Math.random()*2,
  speed: Math.random()*0.3
}));

/* SONGS */
const songs = [
{ name:"Paul and Djon", src:"paul and djon.mp3" },
{ name:"Almostblue", src:"Almostbloue.mp3" },
{ name:"Architecture", src:"Architecture2.mp3" },
{ name:"bailey", src:"bailey3.mp3" },
{ name:"BODYOFME", src:"BODYOFME RM.mp3" },
{ name:"deathproof", src:"deathproof2.mp3" }
];

const radius = 180;

let currentAudio = null;
let currentIndex = null;
let hovered = null;

/* CREATE UI */
songs.forEach((s,i)=>{
  const ui = document.createElement("div");
  ui.className = "track-ui";
  ui.innerHTML = `
    <div>${s.name}</div>
    <div class="progress"><div class="progress-bar"></div></div>
    <div class="time">0:00</div>
  `;
  document.body.appendChild(ui);
  s.ui = ui;
  s.bar = ui.querySelector(".progress-bar");
  s.time = ui.querySelector(".time");
});

/* DRAW */
function draw(){
  requestAnimationFrame(draw);
  ctx.clearRect(0,0,w,h);

  /* stars */
  stars.forEach(s=>{
    s.y += s.speed;
    if(s.y > h) s.y = 0;
    ctx.fillStyle="white";
    ctx.fillRect(s.x,s.y,s.r,s.r);
  });

  const step = Math.PI*2 / songs.length;

  songs.forEach((s,i)=>{
    const angle = i*step;
    let x = w/2 + Math.cos(angle)*radius;
    let y = h/2 + Math.sin(angle)*radius;

    let size = 25;

    if(i === hovered) size = 35;
    if(i === currentIndex) size = 45;

    /* PLANET */
    ctx.beginPath();
    ctx.arc(x,y,size,0,Math.PI*2);
    ctx.fillStyle = ["#ff3b3b","#00d4ff","#ffd93b","#8aff3b","#ff7af6","#3b8aff"][i%6];
    ctx.shadowBlur = (i===hovered)?20:0;
    ctx.shadowColor = "white";
    ctx.fill();

    ctx.shadowBlur = 0;

    /* CRATERS */
    for(let j=0;j<3;j++){
      ctx.fillStyle="rgba(0,0,0,0.2)";
      ctx.beginPath();
      ctx.arc(x-10+Math.random()*20,y-10+Math.random()*20,3,0,Math.PI*2);
      ctx.fill();
    }

    /* GAS CLOUD */
    ctx.fillStyle="rgba(255,255,255,0.1)";
    ctx.beginPath();
    ctx.arc(x+5,y-5,size*0.6,0,Math.PI*2);
    ctx.fill();

    /* RING */
    if(i%2===0){
      ctx.beginPath();
      ctx.ellipse(x,y,size+12,10,0.5,0,Math.PI*2);
      ctx.strokeStyle="white";
      ctx.stroke();
    }

    /* UI POSITION */
    s.ui.style.left = x+"px";
    s.ui.style.top = (y+60)+"px";

    s.x = x;
    s.y = y;
  });
}
draw();

/* HOVER */
canvas.addEventListener("mousemove", e=>{
  hovered = null;
  songs.forEach((s,i)=>{
    if(Math.hypot(e.clientX-s.x, e.clientY-s.y)<30){
      hovered = i;
    }
  });
});

/* CLICK */
canvas.addEventListener("click", e=>{
  songs.forEach((s,i)=>{
    if(Math.hypot(e.clientX-s.x, e.clientY-s.y)<30){

      if(currentIndex === i){
        currentAudio.pause();
        currentIndex = null;
        return;
      }

      if(currentAudio) currentAudio.pause();

      currentAudio = new Audio(s.src);
      currentAudio.play();
      currentIndex = i;

      currentAudio.ontimeupdate = ()=>{
        const p = currentAudio.currentTime/currentAudio.duration;
        s.bar.style.width = (p*100)+"%";

        let m = Math.floor(currentAudio.currentTime/60);
        let sec = Math.floor(currentAudio.currentTime%60).toString().padStart(2,"0");
        s.time.textContent = `${m}:${sec}`;
      };
    }
  });
});
</script>

</body>
</html>
