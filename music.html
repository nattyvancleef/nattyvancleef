<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Music - nattyvancleef</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@300&display=swap');

body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: 'Helvetica Neue', Arial, sans-serif;
  overflow: hidden;
}

/* NAV */
nav {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 10;
}
nav ul {
  display: flex;
  gap: 30px;
  list-style: none;
}
nav a {
  color: #fff;
  text-decoration: none;
  font-size: 24px;
  font-weight: 300;
}
nav a:hover { filter: blur(1px); }

.return-arrow {
  position: fixed;
  top: 20px;
  left: 20px;
  color: #fff;
  text-decoration: none;
  font-size: 14px;
}

/* UI */
.track-ui {
  position: absolute;
  transform: translate(-50%, -50%);
  width: 140px;
  text-align: center;
  font-size: 12px;
}

.progress {
  height: 5px;
  background: rgba(255,255,255,0.2);
  margin-top: 5px;
  cursor: pointer;
}
.progress-bar {
  height: 100%;
  width: 0%;
  background: white;
}
.time {
  font-size: 10px;
  opacity: 0.6;
  text-align: right;
}

/* arrows */
.arrow {
  position: fixed;
  bottom: 80px;
  font-size: 28px;
  cursor: pointer;
  user-select: none;
}
#leftArrow { left: 45%; }
#rightArrow { right: 45%; }

/* zoom overlay */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  opacity: 0;
  pointer-events: none;
  transition: 0.3s;
}
.overlay.active {
  opacity: 1;
  pointer-events: all;
}
</style>
</head>

<body>

<a href="index.html" class="return-arrow">NVC</a>

<nav>
<ul>
<li><a href="photos.html">Photos</a></li>
<li><a href="videos.html">Videos</a></li>
<li><a href="music.html">Music</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>
</nav>

<div id="leftArrow" class="arrow">←</div>
<div id="rightArrow" class="arrow">→</div>

<div class="overlay" id="overlay"></div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let w = canvas.width = window.innerWidth;
let h = canvas.height = window.innerHeight;

window.addEventListener("resize", () => {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
});

/* PARALLAX STARS */
const layers = [
  {count:60,speed:0.2,size:1},
  {count:40,speed:0.5,size:2},
  {count:25,speed:1,size:3}
];

let stars = layers.map(l =>
  Array.from({length:l.count},()=>({
    x:Math.random()*w,
    y:Math.random()*h
  }))
);

/* SONGS */
const pages = [
[
{ name:"Paul and Djon", src:"paul and djon.mp3", type:"lava" },
{ name:"Almostblue", src:"Almostbloue.mp3", type:"ice" },
{ name:"Architecture", src:"Architecture2.mp3", type:"gas" },
{ name:"bailey", src:"bailey3.mp3", type:"rock" },
{ name:"BODYOFME", src:"BODYOFME RM.mp3", type:"toxic" },
{ name:"deathproof", src:"deathproof2.mp3", type:"ocean" }
],
[
{ name:"track 7", src:"", type:"lava" },
{ name:"track 8", src:"", type:"ice" }
]
];

let currentPage = 0;
let currentAudio = null;
let currentIndex = null;
let zoomed = null;

/* UI BUILD */
function buildUI(){
  document.querySelectorAll(".track-ui").forEach(e=>e.remove());

  pages[currentPage].forEach(s=>{
    const ui=document.createElement("div");
    ui.className="track-ui";
    ui.innerHTML=`
      <div>${s.name}</div>
      <div class="progress"><div class="progress-bar"></div></div>
      <div class="time">0:00</div>
    `;
    document.body.appendChild(ui);

    s.ui=ui;
    s.bar=ui.querySelector(".progress-bar");
    s.time=ui.querySelector(".time");

    ui.querySelector(".progress").addEventListener("click",e=>{
      if(!currentAudio) return;
      const rect=e.target.getBoundingClientRect();
      const p=(e.clientX-rect.left)/rect.width;
      currentAudio.currentTime=p*currentAudio.duration;
    });
  });
}
buildUI();

/* PLANET DRAWERS */
function drawPlanet(x,y,size,type){

  if(type==="lava"){
    ctx.fillStyle="#ff3b3b";
    ctx.beginPath(); ctx.arc(x,y,size,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle="orange";
    for(let i=0;i<5;i++){
      ctx.beginPath();
      ctx.moveTo(x-size/2+Math.random()*size,y-size/2+Math.random()*size);
      ctx.lineTo(x-size/2+Math.random()*size,y-size/2+Math.random()*size);
      ctx.stroke();
    }
  }

  if(type==="ice"){
    ctx.fillStyle="#aeeaff";
    ctx.beginPath(); ctx.arc(x,y,size,0,Math.PI*2); ctx.fill();
    ctx.fillStyle="white";
    ctx.fillRect(x-5,y-5,10,2);
  }

  if(type==="gas"){
    ctx.fillStyle="#ffd93b";
    ctx.beginPath(); ctx.arc(x,y,size,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle="rgba(255,255,255,0.4)";
    for(let i=0;i<3;i++){
      ctx.beginPath();
      ctx.arc(x,y,size-i*5,0,Math.PI);
      ctx.stroke();
    }
  }

  if(type==="rock"){
    ctx.fillStyle="#888";
    ctx.beginPath(); ctx.arc(x,y,size,0,Math.PI*2); ctx.fill();
    ctx.fillStyle="#555";
    ctx.beginPath(); ctx.arc(x-5,y-5,5,0,Math.PI*2); ctx.fill();
  }

  if(type==="toxic"){
    ctx.fillStyle="#b84dff";
    ctx.beginPath(); ctx.arc(x,y,size,0,Math.PI*2); ctx.fill();
    ctx.fillStyle="#00ffcc";
    ctx.fillRect(x-3,y-3,6,6);
  }

  if(type==="ocean"){
    ctx.fillStyle="#3b8aff";
    ctx.beginPath(); ctx.arc(x,y,size,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle="white";
    ctx.beginPath();
    ctx.arc(x,y,size-5,0,Math.PI);
    ctx.stroke();
  }
}

/* DRAW LOOP */
function draw(){
  requestAnimationFrame(draw);
  ctx.clearRect(0,0,w,h);

  layers.forEach((l,i)=>{
    stars[i].forEach(s=>{
      s.y+=l.speed;
      if(s.y>h) s.y=0;
      ctx.fillRect(s.x,s.y,l.size,l.size);
    });
  });

  const songs=pages[currentPage];
  const step=Math.PI*2/songs.length;
  const radius= zoomed!==null ? 0 : 180;

  songs.forEach((s,i)=>{
    const angle=i*step;
    let x=w/2 + Math.cos(angle)*radius;
    let y=h/2 + Math.sin(angle)*radius;

    let size = (zoomed===i)?80:25;

    drawPlanet(x,y,size,s.type);

    s.ui.style.display = (zoomed!==null && zoomed!==i) ? "none" : "block";
    s.ui.style.left=x+"px";
    s.ui.style.top=(y+60)+"px";

    s.x=x; s.y=y;
  });
}
draw();

/* CLICK */
canvas.addEventListener("click",e=>{
  pages[currentPage].forEach((s,i)=>{
    if(Math.hypot(e.clientX-s.x,e.clientY-s.y)<30){

      if(zoomed===i){
        zoomed=null;
        document.getElementById("overlay").classList.remove("active");
        return;
      }

      zoomed=i;
      document.getElementById("overlay").classList.add("active");

      if(!s.src) return;

      if(currentIndex===i){
        currentAudio.pause();
        currentIndex=null;
        return;
      }

      if(currentAudio) currentAudio.pause();

      currentAudio=new Audio(s.src);
      currentAudio.play();
      currentIndex=i;

      currentAudio.ontimeupdate=()=>{
        const p=currentAudio.currentTime/currentAudio.duration;
        s.bar.style.width=(p*100)+"%";

        let m=Math.floor(currentAudio.currentTime/60);
        let sec=Math.floor(currentAudio.currentTime%60).toString().padStart(2,"0");
        s.time.textContent=`${m}:${sec}`;
      };
    }
  });
});

/* ARROWS */
document.getElementById("leftArrow").onclick=()=>{
  currentPage = (currentPage-1+pages.length)%pages.length;
  buildUI();
};

document.getElementById("rightArrow").onclick=()=>{
  currentPage = (currentPage+1)%pages.length;
  buildUI();
};
</script>

</body>
</html>
