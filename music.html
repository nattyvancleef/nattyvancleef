<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Music - nattyvancleef</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@300&display=swap');

body {
  margin: 0;
  font-family: 'Helvetica Neue', Arial, sans-serif;
  background: #0a0a0a;
  color: #fff;
  overflow: hidden;
}

/* NAV */
nav {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 10;
}

nav ul {
  display: flex;
  gap: 30px;
  list-style: none;
  margin: 0;
  padding: 0;
}

nav a {
  color: #fff;
  text-decoration: none;
  font-size: 24px;
  font-weight: 300;
  transition: filter 0.3s;
}

nav a:hover {
  filter: blur(1px);
}

.return-arrow {
  position: fixed;
  top: 20px;
  left: 20px;
  color: #fff;
  text-decoration: none;
  font-size: 14px;
  letter-spacing: 2px;
  opacity: 0.6;
  z-index: 10;
}

/* overlay */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  opacity: 0;
  pointer-events: none;
  transition: 0.3s;
}
.overlay.active {
  opacity: 1;
  pointer-events: all;
}

/* UI */
.track-ui {
  position: absolute;
  transform: translate(-50%, -50%);
  width: 140px;
  text-align: center;
  font-size: 12px;
}

.progress {
  height: 4px;
  background: rgba(255,255,255,0.2);
  margin-top: 6px;
  cursor: pointer;
}
.progress-bar {
  height: 100%;
  width: 0%;
  background: white;
}

.time {
  font-size: 10px;
  opacity: 0.6;
  text-align: right;
}
</style>
</head>

<body>

<a href="index.html" class="return-arrow">NVC</a>

<nav>
<ul>
<li><a href="photos.html">Photos</a></li>
<li><a href="videos.html">Videos</a></li>
<li><a href="music.html">Music</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>
</nav>

<div id="overlay" class="overlay"></div>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let w = canvas.width = window.innerWidth;
let h = canvas.height = window.innerHeight;

window.addEventListener("resize", () => {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
});

/* AUDIO SYSTEM (Web Audio API) */
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let analyser = audioCtx.createAnalyser();
analyser.fftSize = 256;

let sourceNode = null;
let currentAudio = null;

function setupAudio(audio){
  if(sourceNode) sourceNode.disconnect();

  sourceNode = audioCtx.createMediaElementSource(audio);
  sourceNode.connect(analyser);
  analyser.connect(audioCtx.destination);
}

/* DATA */
const tracks = [
{ name:"Paul and Djon", src:"paul and djon.mp3" },
{ name:"Almostblue", src:"Almostbloue.mp3" },
{ name:"Architecture", src:"Architecture2.mp3" },
{ name:"bailey", src:"bailey3.mp3" }
];

let hovered = null;
let zoomed = null;
let angleOffsets = tracks.map(()=>0);

/* UI */
function buildUI(){
  document.querySelectorAll(".track-ui").forEach(e=>e.remove());

  tracks.forEach(t=>{
    const ui=document.createElement("div");
    ui.className="track-ui";
    ui.innerHTML=`
      <div>${t.name}</div>
      <div class="progress"><div class="progress-bar"></div></div>
      <div class="time">0:00</div>
    `;
    document.body.appendChild(ui);

    t.ui=ui;
    t.bar=ui.querySelector(".progress-bar");
    t.time=ui.querySelector(".time");
  });
}
buildUI();

/* AUDIO DATA */
let dataArray = new Uint8Array(analyser.frequencyBinCount);

function getBass(){
  analyser.getByteFrequencyData(dataArray);
  let sum = 0;
  for(let i=0;i<10;i++) sum += dataArray[i];
  return sum / 10 / 255;
}

/* VINYL DRAW */
function drawVinyl(x, y, size, i){

  let bass = getBass();
  let wobble = bass * 8;

  ctx.save();
  ctx.translate(x,y);
  ctx.rotate(angleOffsets[i]);

  // disc
  ctx.beginPath();
  ctx.arc(0,0,size + wobble,0,Math.PI*2);
  ctx.fillStyle="#111";
  ctx.fill();

  // grooves
  for(let r=5;r<size;r+=4){
    ctx.beginPath();
    ctx.arc(0,0,r,0,Math.PI*2);
    ctx.strokeStyle="rgba(255,255,255,0.05)";
    ctx.stroke();
  }

  // label
  ctx.beginPath();
  ctx.arc(0,0,size*0.3,0,Math.PI*2);
  ctx.fillStyle="#ddd";
  ctx.fill();

  ctx.restore();
}

/* DRAW LOOP */
function draw(){
  requestAnimationFrame(draw);
  ctx.clearRect(0,0,w,h);

  const radius = zoomed!==null ? 0 : 180;
  const step = Math.PI*2/tracks.length;

  tracks.forEach((t,i)=>{

    let angle = i*step;

    let x = w/2 + Math.cos(angle)*radius;
    let y = h/2 + Math.sin(angle)*radius;

    let size = (zoomed===i)?100:(hovered===i?35:25);

    drawVinyl(x,y,size,i);

    t.x=x; t.y=y;

    t.ui.style.left = x+"px";
    t.ui.style.top = (y+60)+"px";

    // spin if playing
    if(currentAudio && zoomed===i){
      angleOffsets[i] += 0.02;
    }
  });
}
draw();

/* HOVER */
canvas.addEventListener("mousemove",e=>{
  hovered=null;

  tracks.forEach((t,i)=>{
    let size = (zoomed===i)?100:25;

    if(Math.hypot(e.clientX-t.x,e.clientY-t.y)<size){
      hovered=i;
    }
  });
});

/* SCRATCHING */
let dragging = false;

canvas.addEventListener("mousedown",e=>{
  if(zoomed!==null) dragging = true;
});

canvas.addEventListener("mouseup",()=> dragging=false);

canvas.addEventListener("mousemove",e=>{
  if(dragging && currentAudio){
    currentAudio.currentTime += e.movementX * 0.01;
    angleOffsets[zoomed] += e.movementX * 0.01;
  }
});

/* CLICK */
canvas.addEventListener("click", e => {

  let clicked = false;

  tracks.forEach((t,i)=>{
    let size = (zoomed===i)?100:30;

    if(Math.hypot(e.clientX-t.x,e.clientY-t.y)<size){

      clicked = true;

      if(zoomed===i){
        stopAudio();
        return;
      }

      zoomed=i;
      overlay.classList.add("active");

      if(currentAudio) stopAudio();

      let audio = new Audio(t.src);
      setupAudio(audio);

      audio.play();
      currentAudio = audio;
    }
  });

  if(!clicked && zoomed!==null){
    stopAudio();
  }
});

/* STOP */
function stopAudio(){
  if(currentAudio){
    currentAudio.pause();
    currentAudio = null;
  }
  zoomed = null;
  overlay.classList.remove("active");
}

/* OVERLAY CLICK */
overlay.addEventListener("click", stopAudio);
</script>

</body>
</html>
