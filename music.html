<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Music - nattyvancleef</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300&display=swap');

body {
  margin: 0;
  font-family: 'Inter', Arial, sans-serif;
  background: #f4f1ea;
  color: #111;
}

/* ================= PAPER TEXTURE ================= */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;

  background-image:
    url("https://www.transparenttextures.com/patterns/paper-1.png");

  opacity: 0.25;
  mix-blend-mode: multiply;
}

/* subtle print noise */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;

  background: radial-gradient(rgba(0,0,0,0.03) 1px, transparent 1px);
  background-size: 3px 3px;

  opacity: 0.4;
}

/* ================= NAV ================= */
nav {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 50;
}
nav ul {
  display: flex;
  gap: 30px;
  list-style: none;
  margin: 0;
  padding: 0;
}
nav a {
  color: #111;
  text-decoration: none;
  font-size: 24px;
  font-weight: 300;
  transition: filter 0.3s;
}
nav a:hover { filter: blur(1px); }

.return-arrow {
  position: fixed;
  top: 20px;
  left: 20px;
  color: #111;
  text-decoration: none;
  font-size: 14px;
  letter-spacing: 2px;
  z-index: 50;
  opacity: 0.6;
}

/* ================= PAGE ================= */

.page {
  padding: 120px 40px 80px;
  max-width: 1100px;
  margin: auto;
}

.header {
  border-bottom: 2px solid #000;
  padding-bottom: 10px;
  margin-bottom: 20px;
}

.header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 48px;
  margin: 0;
  letter-spacing: 1px;
}

.subhead {
  font-size: 12px;
  opacity: 0.6;
  margin-top: 6px;
}

/* ================= COLUMNS ================= */

.columns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
}

/* ================= TRACK ================= */

.track {
  display: flex;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid rgba(0,0,0,0.15);
  cursor: pointer;
  transition: background 0.2s;
}

.track:hover {
  background: rgba(0,0,0,0.05);
}

.rank {
  font-weight: bold;
  width: 30px;
}

.track-info {
  flex: 1;
}

.track-name {
  font-size: 16px;
}

/* catalog / label line */
.meta {
  font-size: 11px;
  opacity: 0.6;
  letter-spacing: 0.5px;
  margin-top: 2px;
}

.track.active {
  background: rgba(0,0,0,0.1);
}

/* ================= PLAYER ================= */

.player {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #111;
  color: #fff;
  padding: 12px 20px;
  font-size: 14px;
  display: none;
}

.player.active {
  display: block;
}

/* ================= MOBILE ================= */

@media (max-width: 600px){

  body {
    background: #000;
    color: #fff;
  }

  body::before,
  body::after {
    opacity: 0.15;
  }

  nav a {
    font-size: 20px;
    color: #fff;
  }

  .return-arrow {
    color: #fff;
    font-size: 16px;
  }

  .page {
    padding: 100px 15px 80px;
  }

  .header h1 {
    font-size: 32px;
  }

  .columns {
    grid-template-columns: 1fr;
    gap: 20px;
  }

  .track {
    border-color: rgba(255,255,255,0.2);
  }

  .track:hover {
    background: rgba(255,255,255,0.05);
  }

  .meta {
    opacity: 0.5;
  }

  .player {
    background: #000;
  }
}
</style>
</head>

<body>

<a href="index.html" class="return-arrow">NVC</a>

<nav>
<ul>
<li><a href="photos.html">Photos</a></li>
<li><a href="videos.html">Videos</a></li>
<li><a href="music.html">Music</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>
</nav>

<div class="page">

  <div class="header">
    <h1>BEST SELLING TRACKS</h1>
    <div class="subhead">nattyvancleef archive — weekly selection</div>
  </div>

  <div class="columns" id="columns"></div>

</div>

<div id="player" class="player"></div>

<script>

const tracks = [
{ name:"Paul and Djon", src:"paul and djon.mp3" },
{ name:"Almostblue", src:"Almostbloue.mp3" },
{ name:"Architecture", src:"Architecture2.mp3" },
{ name:"bailey", src:"bailey3.mp3" },
{ name:"BODYOFME", src:"BODYOFME RM.mp3" },
{ name:"deathproof", src:"deathproof2.mp3" }
];

/* fake catalog generator */
function catalog(i){
  const labels = ["NVC", "ARC", "STU", "TAPE"];
  const label = labels[i % labels.length];
  const num = 1000 + Math.floor(Math.random()*9000);
  return `${label}-${num}`;
}

const columns = document.getElementById("columns");
const player = document.getElementById("player");

let currentAudio = null;

function build(){
  columns.innerHTML = "";

  const mid = Math.ceil(tracks.length / 2);
  const col1 = tracks.slice(0, mid);
  const col2 = tracks.slice(mid);

  [col1, col2].forEach((col, ci) => {
    const div = document.createElement("div");

    col.forEach((t, i) => {
      const index = ci * mid + i;

      const row = document.createElement("div");
      row.className = "track";

      row.innerHTML = `
        <div class="rank">${index + 1}</div>
        <div class="track-info">
          <div class="track-name">${t.name}</div>
          <div class="meta">${catalog(index)} • independent release</div>
        </div>
      `;

      row.onclick = () => play(t, row);

      div.appendChild(row);
    });

    columns.appendChild(div);
  });
}

function play(track, el){

  document.querySelectorAll(".track").forEach(t => t.classList.remove("active"));
  el.classList.add("active");

  if(currentAudio){
    currentAudio.pause();
  }

  if(track.src){
    const audio = new Audio(track.src);
    audio.play();
    currentAudio = audio;

    player.classList.add("active");
    player.textContent = "Now playing — " + track.name;

    audio.onended = () => {
      player.classList.remove("active");
      el.classList.remove("active");
    };
  }
}

build();

</script>

</body>
</html>
