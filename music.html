<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music - nattyvancleef</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@700&family=IBM+Plex+Mono:wght@300&display=swap');

body {
  margin: 0;
  font-family: 'IBM Plex Mono', monospace;
  background: #fff;
  color: #000;
}

/* PAPER TEXTURE */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image: url("https://www.transparenttextures.com/patterns/paper-1.png");
  opacity: 0.18;
}

/* NAV */
nav {
  position: fixed;
  top: 20px;
  right: 20px;
}
nav ul {
  display: flex;
  gap: 25px;
  list-style: none;
  margin: 0;
  padding: 0;
}
nav a {
  color: #000;
  text-decoration: none;
  font-size: 16px;
}

.return-arrow {
  position: fixed;
  top: 20px;
  left: 20px;
  font-size: 11px;
  letter-spacing: 2px;
  text-decoration: none;
  color: #000;
}

/* PAGE */
.page {
  padding: 100px 40px 80px;
  max-width: 1000px;
  margin: auto;
}

/* HEADER */
.header {
  border-bottom: 3px solid #000;
  margin-bottom: 20px;
  padding-bottom: 6px;
}
.header h1 {
  font-family: 'Libre Baskerville', serif;
  font-size: 40px;
  margin: 0;
  letter-spacing: 2px;
}

/* COLUMNS */
.columns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 30px;
  position: relative;
}

/* CENTER LINE */
.columns::after {
  content: "";
  position: absolute;
  top: 0;
  bottom: 0;
  left: 50%;
  width: 1px;
  background: #000;
  opacity: 0.6;
}

/* TRACK */
.track {
  display: flex;
  gap: 10px;
  padding: 5px 0;
  border-bottom: 1px solid #000;
  cursor: pointer;
}
.track:hover {
  background: rgba(0,0,0,0.03);
}

.rank {
  font-weight: bold;
  width: 22px;
}

.track-name {
  font-size: 13px;
  letter-spacing: 1px;
}

.meta {
  font-size: 10px;
  letter-spacing: 1.5px;
}

/* PLAYER */
.player {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #000;
  color: #fff;
  padding: 10px 20px;
  font-size: 12px;
  display: none;
}
.player.active {
  display: block;
}

/* MOBILE */
@media (max-width: 600px){
  .columns {
    grid-template-columns: 1fr;
  }
  .columns::after {
    display: none;
  }
}
</style>
</head>

<body>

<a href="index.html" class="return-arrow">NVC</a>

<nav>
<ul>
<li><a href="photos.html">Photos</a></li>
<li><a href="videos.html">Videos</a></li>
<li><a href="music.html">Music</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>
</nav>

<div class="page">
  <div class="header">
    <h1>NATTYVANCLEEF</h1>
  </div>

  <div class="columns" id="columns"></div>
</div>

<div id="player" class="player"></div>

<script>
const tracks = [
{ name:"Paul and Djon", src:"paul and djon.mp3" },
{ name:"Almostblue", src:"Almostbloue.mp3" },
{ name:"Architecture", src:"Architecture2.mp3" },
{ name:"bailey", src:"bailey3.mp3" },
{ name:"BODYOFME", src:"BODYOFME RM.mp3" },
{ name:"deathproof", src:"deathproof2.mp3" }
];

/* UNIQUE 3-DIGIT SYSTEM */
let usedNumbers = new Set();

function generateNumber(){
  let num;
  do {
    num = Math.floor(100 + Math.random() * 900);
  } while(usedNumbers.has(num));
  usedNumbers.add(num);
  return num;
}

function catalog(){
  return `NVC-${generateNumber()}`;
}

const columns = document.getElementById("columns");
const player = document.getElementById("player");

let currentAudio = null;

function build(){
  columns.innerHTML = "";
  usedNumbers.clear();

  const mid = Math.ceil(tracks.length / 2);
  const col1 = tracks.slice(0, mid);
  const col2 = tracks.slice(mid);

  [col1, col2].forEach((col, ci) => {
    const div = document.createElement("div");

    col.forEach((t, i) => {
      const index = ci * mid + i;

      const row = document.createElement("div");
      row.className = "track";

      row.innerHTML = `
        <div class="rank">${index + 1}</div>
        <div>
          <div class="track-name">${t.name.toUpperCase()}</div>
          <div class="meta">${catalog()}</div>
        </div>
      `;

      row.onclick = () => play(t, row);
      div.appendChild(row);
    });

    columns.appendChild(div);
  });
}

function play(track, el){
  document.querySelectorAll(".track").forEach(t => t.classList.remove("active"));
  el.classList.add("active");

  if(currentAudio){
    currentAudio.pause();
  }

  if(track.src){
    const audio = new Audio(track.src);
    audio.play();
    currentAudio = audio;

    player.classList.add("active");
    player.textContent = "Now playing — " + track.name;

    audio.onended = () => {
      player.classList.remove("active");
      el.classList.remove("active");
    };
  }
}

build();
</script>

</body>
</html>
