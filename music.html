<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Music - nattyvancleef</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@300&display=swap');

body {
  margin: 0;
  font-family: 'Helvetica Neue', Arial, sans-serif;
  background: radial-gradient(circle at center, #0b0b0b 0%, #000 70%);
  color: #fff;
  overflow-x: hidden;
}

/* ================= NAV (UNCHANGED ACROSS SITE) ================= */
nav {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 50;
}
nav ul {
  display: flex;
  gap: 30px;
  list-style: none;
  margin: 0;
  padding: 0;
}
nav a {
  color: #fff;
  text-decoration: none;
  font-size: 24px;
  font-weight: 300;
  transition: filter 0.3s;
}
nav a:hover { filter: blur(1px); }

.return-arrow {
  position: fixed;
  top: 20px;
  left: 20px;
  color: #fff;
  text-decoration: none;
  font-size: 14px;
  letter-spacing: 2px;
  z-index: 50;
  opacity: 0.6;
}

/* ================= JUKEBOX CABINET ================= */

.page {
  min-height: 200vh; /* allows scroll reveal of full cabinet */
  padding: 120px 0;
}

.cabinet {
  position: relative;
  width: min(900px, 92vw);
  margin: 0 auto;
  border-radius: 40px;

  background: linear-gradient(145deg, #1a1a1a, #050505);
  border: 2px solid rgba(255,255,255,0.12);

  box-shadow:
    inset 0 0 60px rgba(255,255,255,0.06),
    0 0 80px rgba(0,0,0,0.8);

  overflow: hidden;
}

/* glowing neon glass */
.cabinet::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at top, rgba(255,0,150,0.15), transparent 50%),
    radial-gradient(circle at bottom, rgba(0,255,255,0.12), transparent 60%);
  pointer-events: none;
}

/* top arch glow */
.header {
  text-align: center;
  padding: 25px 10px;
  font-size: 12px;
  letter-spacing: 4px;
  opacity: 0.7;
}

/* neon title */
.title {
  text-align: center;
  font-size: 22px;
  margin-top: -10px;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: #fff;
  text-shadow:
    0 0 10px rgba(255,0,200,0.5),
    0 0 20px rgba(0,255,255,0.3);
}

/* ================= TRACK PANEL ================= */

.jukebox {
  display: flex;
  flex-direction: column;
  gap: 14px;
  align-items: center;
  justify-content: center;
  padding: 40px 20px 60px;
}

.track {
  width: min(600px, 82vw);
  padding: 16px 18px;
  border-radius: 14px;

  background: rgba(20,20,20,0.7);
  border: 1px solid rgba(255,255,255,0.15);

  font-size: 18px;
  cursor: pointer;

  display: flex;
  align-items: center;

  transition: transform 0.25s ease, border 0.25s ease;
  position: relative;
  overflow: hidden;
}

.track:hover {
  transform: scale(1.02);
  border-color: rgba(255,255,255,0.5);
}

/* play icon */
.track::before {
  content: "▶";
  margin-right: 12px;
  opacity: 0.7;
}

/* active glow */
.track.active {
  border-color: rgba(255,255,255,0.7);
  background: rgba(40,40,40,0.95);
  box-shadow: 0 0 25px rgba(255,0,180,0.15);
}

/* cassette insert animation */
.track.active::after {
  content: "";
  position: absolute;
  top: 0;
  left: -120%;
  width: 120%;
  height: 100%;
  background: linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.25),
    transparent
  );
  animation: slide 0.8s ease forwards;
}

@keyframes slide {
  from { left: -120%; }
  to { left: 120%; }
}

/* ================= LOWER DECORATIVE JUKEBOX SECTION ================= */

.bottom {
  height: 600px;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0.6;
  font-size: 12px;
  letter-spacing: 3px;
}

/* ================= ARROWS ================= */

.arrow {
  position: fixed;
  bottom: 60px;
  font-size: 24px;
  cursor: pointer;
  z-index: 50;
}
#leftArrow { left: 48%; }
#rightArrow { right: 48%; }

/* overlay */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  opacity: 0;
  pointer-events: none;
  transition: 0.3s;
}
.overlay.active {
  opacity: 1;
  pointer-events: all;
}

/* ================= MOBILE (ONLY SCALE + SPACING, SAME DESIGN) ================= */

@media (max-width: 600px){

  nav a {
    font-size: 20px;
  }

  .return-arrow {
    font-size: 16px;
  }

  .cabinet {
    border-radius: 26px;
  }

  .track {
    font-size: 16px;
    padding: 14px 16px;
  }

  .title {
    font-size: 18px;
  }
}
</style>
</head>

<body>

<a href="index.html" class="return-arrow">NVC</a>

<nav>
  <ul>
    <li><a href="photos.html">Photos</a></li>
    <li><a href="videos.html">Videos</a></li>
    <li><a href="music.html">Music</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<div class="page">

  <div class="cabinet">

    <div class="header">JUKEBOX SYSTEM</div>
    <div class="title">SELECT A TRACK</div>

    <div class="jukebox" id="jukebox"></div>

    <div class="bottom">
      ▼ chrome cabinet continues ▼
    </div>

  </div>

</div>

<div id="leftArrow" class="arrow">←</div>
<div id="rightArrow" class="arrow">→</div>
<div id="overlay" class="overlay"></div>

<script>

const pages = [
[
{ name:"Paul and Djon", src:"paul and djon.mp3" },
{ name:"Almostblue", src:"Almostbloue.mp3" },
{ name:"Architecture", src:"Architecture2.mp3" },
{ name:"bailey", src:"bailey3.mp3" },
{ name:"BODYOFME", src:"BODYOFME RM.mp3" },
{ name:"deathproof", src:"deathproof2.mp3" }
],
[
{ name:"...", src:"" },
{ name:"...", src:"" },
{ name:"...", src:"" },
{ name:"...", src:"" },
{ name:"...", src:"" },
{ name:"...", src:"" }
],
[
{ name:"...", src:"" },
{ name:"...", src:"" },
{ name:"...", src:"" },
{ name:"...", src:"" },
{ name:"...", src:"" }
]
];

let currentPage = 0;
let currentAudio = null;

const jukebox = document.getElementById("jukebox");

function build(){
  jukebox.innerHTML = "";

  pages[currentPage].forEach((t,i)=>{
    const div = document.createElement("div");
    div.className = "track";
    div.textContent = t.name;

    div.onclick = () => play(i, div);

    jukebox.appendChild(div);
  });
}

function play(i, el){

  const t = pages[currentPage][i];

  document.querySelectorAll(".track").forEach(x=>{
    x.classList.remove("active");
  });

  if(currentAudio){
    currentAudio.pause();
  }

  if(t.src){
    const audio = new Audio(t.src);
    audio.play();
    currentAudio = audio;

    el.classList.add("active");
    overlay.classList.add("active");

    audio.onended = () => {
      overlay.classList.remove("active");
      el.classList.remove("active");
    };
  }
}

leftArrow.onclick = () => {
  currentPage = (currentPage - 1 + pages.length) % pages.length;
  if(currentAudio) currentAudio.pause();
  overlay.classList.remove("active");
  build();
};

rightArrow.onclick = () => {
  currentPage = (currentPage + 1) % pages.length;
  if(currentAudio) currentAudio.pause();
  overlay.classList.remove("active");
  build();
};

overlay.onclick = () => {
  if(currentAudio) currentAudio.pause();
  overlay.classList.remove("active");
};

build();

</script>

</body>
</html>
