<!DOCTYPE html>

  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: #f7f6f4;
      color: #1a1a1a;
    }

    /* Return arrow styled as a keyhole with blur effect */
    .return-arrow {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 24px;
      color: #fff;
      text-decoration: none;
      padding: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(4px);
      transition: filter 0.3s, background 0.3s;
      z-index: 10;
    }

    .return-arrow:hover {
      filter: blur(1px);
      background: rgba(255, 255, 255, 0.3);
    }

    /* Toggle button for hero video overlay */
    .toggle-hero {
      position: fixed;
      top: 20px;
      right: 20px;
      font-size: 36px;
      cursor: pointer;
      z-index: 1000;
      color: #fff;
      background: rgba(0, 0, 0, 0.4);
      padding: 15px;
      border-radius: 50%;
      transition: background 0.3s;
    }

    .toggle-hero:hover {
      background: rgba(0, 0, 0, 0.6);
    }

    section {
      padding: 50px 20px;
      max-width: 1200px;
      margin: auto;
      text-align: center;
    }

    h2 {
      font-size: 2em;
      margin-bottom: 20px;
    }

    p {
      color: #666;
      line-height: 1.6;
    }

    /* Grid layout for photos */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 40px;
    }

    /* Style for each photo card */
    .card {
      border-radius: 10px;
      overflow: hidden;
      border: 2px solid #ccc; /* Uniform border for all images */
      cursor: pointer; /* Indicate clickable images */
      background: #fff; /* Optional: background for the card */
    }

    /* Make images responsive and fit container */
    .card img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 10px; /* Match container border radius */
      transition: transform 0.3s; /* Optional: smooth zoom effect on hover */
    }

    /* Optional: add zoom effect on hover */
    .card img:hover {
      transform: scale(1.02);
    }

    /* Style for the full-size image overlay ("lightbox") */
    #lightbox {
      display: none; /* Hidden by default */
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.8);
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }

    #lightbox img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      cursor: pointer;
      transition: transform 0.3s;
    }

    #lightbox img:hover {
      transform: scale(1.05);
    }

    /* Style for the hero video overlay container */
    #hero-video {
      display: none; /* Hidden by default */
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 999; /* Behind the toggle button */
    }

    #hero-video video {
      width: 100%; height: 100%; object-fit: cover;
    }
  </style>
</head>

<script>
  function toggleHeroVideo() {
    const heroVideo = document.getElementById('hero-video');
    if (heroVideo) {
      heroVideo.style.display = (heroVideo.style.display === 'block') ? 'none' : 'block';
    }
  }

  // Lightbox functionality
  document.querySelectorAll('.card img').forEach(img => {
    img.addEventListener('click', () => {
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = lightbox.querySelector('img');
      lightboxImg.src = img.src;
      lightbox.style.display = 'flex';
    });
  });

  function closeLightbox() {
    document.getElementById('lightbox').style.display = 'none';
  }
</script>
