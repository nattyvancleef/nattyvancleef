<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Museum</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#e9e9e9;
  overflow:hidden;
}

#scene {
  width:100vw;
  height:100vh;
  perspective:1200px;
}

.room {
  position:absolute;
  width:2000px;
  height:1200px;
  left:50%;
  top:50%;
  transform-style:preserve-3d;
  transform:translate(-50%,-50%) rotateY(0deg);
  transition:transform 0.8s ease, opacity 0.8s ease;
}

.wall {
  position:absolute;
  width:2000px;
  height:1200px;
  background:#fdfdfd;
  box-shadow:inset 0 0 120px rgba(0,0,0,0.08);
}

.wall.front { transform: translateZ(1000px); }
.wall.back { transform: rotateY(180deg) translateZ(1000px); }
.wall.left { transform: rotateY(-90deg) translateZ(1000px); }
.wall.right { transform: rotateY(90deg) translateZ(1000px); }

.floor {
  position:absolute;
  width:2000px;
  height:2000px;
  background:linear-gradient(#ddd,#cfcfcf);
  transform: rotateX(90deg) translateZ(-600px);
}

.art {
  position:absolute;
  cursor:pointer;
  transition:transform 0.3s ease;
}

.art img {
  max-width:260px;
  display:block;
}

.art:hover {
  transform:scale(1.05);
}

/* VIEWER (zoom instead of hard popup) */
#viewer {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:20;
}

#viewer img {
  max-width:85%;
  max-height:85%;
  transition:transform 0.4s ease;
}

/* CONTROLS */
.controls {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  z-index:10;
}

button {
  padding:10px 15px;
  border:none;
  background:#000;
  color:#fff;
  cursor:pointer;
}

.room-nav {
  position:fixed;
  top:20px;
  right:20px;
  display:flex;
  gap:10px;
  z-index:10;
}

/* MOBILE */
@media(max-width:700px){
  .art img{ max-width:180px; }
}

</style>
</head>

<body>

<div id="scene"></div>

<div id="viewer" onclick="closeViewer()">
  <img src="">
</div>

<div class="controls">
  <button onclick="rotate(-90)">←</button>
  <button onclick="rotate(90)">→</button>
</div>

<div class="room-nav">
  <button onclick="changeRoom(-1)">Prev</button>
  <button onclick="changeRoom(1)">Next</button>
</div>

<script>
const images = [
"DSCF7323.JPEG","DSCF7358.JPEG","DSCF7478.JPEG","DSCF7770.JPEG","DSCF7772.JPEG","DSCF7896.JPEG","DSCF7960.JPEG","DSCF8338.JPEG","DSCF8395.jpg","DSCF8746.JPEG","DSCF8777.JPEG","DSCF8792.JPEG","DSCF8815.JPEG","DSCF8852.JPEG","DSCF9364.JPEG","DSCF9494.JPEG","DSCF9962.JPEG",
"IMG_0234.JPG","IMG_0240.JPEG","IMG_0747.JPEG","IMG_1374.JPEG","IMG_1569.JPEG","IMG_1696.jpg","IMG_1966.jpg","IMG_2026.JPEG","IMG_2078.jpg","IMG_2277 2.jpg","IMG_2277.jpg","IMG_2536.JPEG","IMG_2621.JPEG","IMG_2675.JPG","IMG_2724.JPG","IMG_4057.jpg","IMG_4222.JPG","IMG_6539.jpg",
"Jungle'Cleet06.JPG","P1000007.JPG","P1000086.JPG","P1000098.JPG","P1000170.JPG","P1000195.JPG","P1010086.JPG","110_0603.JPG","B35B75C4-4BA4-434F-A6BB-1DCBAD0984D0.JPG","Chelsea Flower Show'04 009.JPG","DSCF2287.JPEG","DSCF5912.JPEG","DSCF6353.jpg","DSCF6786.JPEG","DSCF6866.JPEG","DSCF6977.JPEG","DSCF7290.JPEG","P1010411.JPG","P1010519.JPG","P1010526.JPG","P1010530.JPEG","P1010546.JPEG","P7260885.JPEG"
];

const scene = document.getElementById('scene');
let rooms = [];
let currentRoom = 0;
let rotation = 0;

function createRoom(imgs){
  const room = document.createElement('div');
  room.className = 'room';

  const walls = ['front','right','back','left'];

  walls.forEach(side => {
    const wall = document.createElement('div');
    wall.className = 'wall ' + side;

    imgs.splice(0,4).forEach((img,i)=>{
      const art = document.createElement('div');
      art.className = 'art';
      art.style.left = (200 + i*350) + 'px';
      art.style.top = (200 + (i%2)*250) + 'px';

      const image = document.createElement('img');
      image.src = img;

      image.onclick = ()=>openViewer(img);

      art.appendChild(image);
      wall.appendChild(art);
    });

    room.appendChild(wall);
  });

  const floor = document.createElement('div');
  floor.className = 'floor';
  room.appendChild(floor);

  return room;
}

let tempImages = [...images];
while(tempImages.length){
  rooms.push(createRoom(tempImages));
}

rooms.forEach((room,i)=>{
  if(i!==0) room.style.opacity = 0;
  scene.appendChild(room);
});

function rotate(deg){
  rotation += deg;
  rooms[currentRoom].style.transform = `translate(-50%,-50%) rotateY(${rotation}deg)`;
}

function changeRoom(dir){
  rooms[currentRoom].style.opacity = 0;
  currentRoom = (currentRoom + dir + rooms.length) % rooms.length;
  rooms[currentRoom].style.opacity = 1;
}

function openViewer(src){
  const viewer = document.getElementById('viewer');
  viewer.style.display='flex';
  viewer.querySelector('img').src = src;
}

function closeViewer(){
  document.getElementById('viewer').style.display='none';
}

// Swipe
let startX=0;
document.addEventListener('touchstart',e=>startX=e.touches[0].clientX);
document.addEventListener('touchend',e=>{
  let endX=e.changedTouches[0].clientX;
  if(endX-startX>50) rotate(-90);
  if(startX-endX>50) rotate(90);
});

</script>

</body>
</html>
