<!DOCTYPE html>
<html>
<head>
  <title>Videos - nattyvancleef</title>
  <meta charset="UTF-8" />
  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: #f7f6f4;
      color: #1a1a1a;
    }

    /* Return arrow styled as a keyhole with blur effect, now displaying "NVC" */
    .return-arrow {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 24px;
      color: #fff;
      text-decoration: none;
      padding: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(4px);
      transition: filter 0.3s, background 0.3s;
      z-index: 10;
    }

    /* Show "NVC" text on arrow button, thinner and stretched */
    .return-arrow::after {
      content: "NVC";
      font-weight: 300; /* Thinner font weight */
      display: inline-block;
      width: 80px; /* Increased width for stretch */
      text-align: center;
    }

    .return-arrow:hover {
      filter: blur(1px);
      background: rgba(255, 255, 255, 0.3);
    }

    /* Removed toggle-hero styles as toggle button is gone */

    section {
      padding: 50px 20px;
      max-width: 1200px;
      margin: auto;
      text-align: center;
    }

    h2 {
      font-size: 2em;
      margin-bottom: 20px;
    }

    p {
      color: #666;
      line-height: 1.6;
    }

    .video-container {
      margin-top: 40px;
    }

    video {
      width: 100%;
      max-width: 800px;
    }

    /* Style for the hero video overlay container */
    #hero-video {
      display: none; /* Hidden by default */
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 999; /* Behind other content */
    }

    #hero-video video {
      width: 100%; height: 100%; object-fit: cover;
    }
  </style>
</head>
<body>

<!-- Hero Video Overlay (hidden by default) -->
<div id="hero-video">
  <video src="waterbabiesnvc.mp4" autoplay muted loop playsinline></video>
</div>

<!-- Return arrow with "NVC" text -->
<a href="index.html" class="return-arrow" aria-label="Return to homepage"></a>

<!-- Removed the toggle button for hero video overlay -->

<section id="videos">
  <h2>Videos</h2>
  <p>Selected video work.</p>
  <div class="video-container">
    <video autoplay muted loop playsinline>
      <source src="waterbabiesnvc.mp4" type="video/mp4" />
    </video>
  </div>
</section>

<script>
  // Removed toggleHeroVideo function as toggle button is gone
</script>

</body>
</html>
