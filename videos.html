<!DOCTYPE html>
<html>
<head>
  <title>Videos - nattyvancleef</title>
  <meta charset="UTF-8" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@300&display=swap');

    body {
      margin: 0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #f7f6f4;
      color: #1a1a1a;
      overflow-x: hidden;
    }

    /* NAV (consistent across site) */
    nav {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10;
    }

    nav ul {
      display: flex;
      gap: 30px;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    nav a {
      color: #fff; /* stays white over video */
      text-decoration: none;
      font-size: 24px;
      font-weight: 300;
      transition: filter 0.3s;
    }

    nav a:hover {
      filter: blur(1px);
    }

    /* NVC (match other pages) */
    .return-arrow {
      position: fixed;
      top: 20px;
      left: 20px;
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 2px;
      z-index: 10;
    }

    /* HERO VIDEO BACKGROUND */
    .hero-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      z-index: -1;
    }

    .hero-background video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* subtle dark overlay for readability (important fix) */
    .hero-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.25);
      z-index: 0;
    }

    section {
      padding: 120px 20px;
      max-width: 900px;
      margin: auto;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    h2 {
      font-size: 24px;
      font-weight: 300;
      letter-spacing: 1px;
      color: #fff;
    }

    p {
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      margin-bottom: 40px;
    }

    .video-container video {
      width: 100%;
      max-width: 800px;
    }

    @media (max-width:600px){
      nav a { font-size:18px; }
    }

  </style>
</head>

<body>

<a href="index.html" class="return-arrow">NVC</a>

<nav>
  <ul>
    <li><a href="photos.html">Photos</a></li>
    <li><a href="videos.html">Videos</a></li>
    <li><a href="music.html">Music</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<!-- Background Video -->
<div class="hero-background">
  <video autoplay muted loop playsinline>
    <source src="waterbabiesnvc.mp4" type="video/mp4" />
  </video>
</div>

<!-- Overlay for contrast -->
<div class="hero-overlay"></div>

<section>
  <h2>VIDEOS</h2>
  <p>Selected video work.</p>

  <div class="video-container">
    <video autoplay muted loop playsinline>
      <source src="waterbabiesnvc.mp4" type="video/mp4" />
    </video>
  </div>
</section>

</body>
</html>
